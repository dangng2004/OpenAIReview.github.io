<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenAIReview — Results</title>
<script>
MathJax = {
  tex: {
    inlineMath: [['$', '$'], ['\\(', '\\)']],
    displayMath: [['$$', '$$'], ['\\[', '\\]']],
    processEscapes: true,
  },
  options: {
    skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code'],
    ignoreHtmlClass: 'no-mathjax',
  },
  startup: { typeset: false }
};
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #fafafa;
  --surface: #ffffff;
  --border: #e5e7eb;
  --border-light: #f0f0f0;
  --text: #1a1a2e;
  --text-secondary: #6b7280;
  --text-muted: #9ca3af;
  --accent: #800020;
  --accent-light: #fdf0f2;
  --accent-hover: #5c0017;
  --green: #10b981;
  --green-light: #ecfdf5;
  --green-border: #a7f3d0;
  --orange: #f59e0b;
  --orange-light: #fffbeb;
  --orange-border: #fde68a;
  --red: #ef4444;
  --red-light: #fef2f2;
  --red-border: #fecaca;
  --radius: 12px;
  --radius-sm: 8px;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
  --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.07), 0 2px 4px -2px rgba(0,0,0,0.05);
  --shadow-focus: 0 0 0 3px rgba(128,0,32,0.15);
  --header-h: 64px;
  --tabs-h: 52px;
  --metrics-h: 44px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ── Header ── */
.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  height: var(--header-h);
  display: flex;
  align-items: center;
  gap: 16px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header .logo {
  font-size: 15px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: -0.3px;
  white-space: nowrap;
  text-decoration: none;
}
.header .separator {
  width: 1px;
  height: 24px;
  background: var(--border);
  flex-shrink: 0;
}
.paper-title {
  font-size: 14px;
  font-weight: 500;
  color: var(--text);
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.legend {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-left: auto;
  font-size: 11px;
  color: var(--text-secondary);
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 5px;
  white-space: nowrap;
}
.legend-swatch {
  width: 12px;
  height: 12px;
  border-radius: 3px;
  border: 1px solid rgba(0,0,0,0.1);
}

/* ── Method Tabs ── */
.tabs-bar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  display: flex;
  align-items: stretch;
  height: var(--tabs-h);
  gap: 2px;
  overflow-x: auto;
}
.method-tab {
  padding: 0 16px;
  font-size: 13px;
  font-weight: 500;
  font-family: inherit;
  color: var(--text-secondary);
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  cursor: pointer;
  transition: color 0.15s, border-color 0.15s, background 0.15s;
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 6px;
}
.method-tab:hover { color: var(--text); background: var(--bg); }
.method-tab.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
  font-weight: 600;
}
.method-tab .tab-count {
  font-size: 11px;
  font-weight: 600;
  background: var(--bg);
  color: var(--text-secondary);
  padding: 1px 6px;
  border-radius: 10px;
  min-width: 20px;
  text-align: center;
}
.method-tab.active .tab-count {
  background: var(--accent-light);
  color: var(--accent);
}

/* ── Metrics Bar ── */
.metrics-bar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  height: var(--metrics-h);
  display: flex;
  align-items: center;
  gap: 20px;
  overflow-x: auto;
  font-size: 12px;
  color: var(--text-secondary);
}
.metric {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  white-space: nowrap;
}
.metric strong { color: var(--text); font-weight: 600; }
.metric-divider { width: 1px; height: 16px; background: var(--border); }

/* ── Main Layout ── */
.main {
  display: flex;
  height: calc(100vh - var(--header-h) - var(--tabs-h) - var(--metrics-h));
}

/* ── Paper Panel ── */
.paper-panel {
  flex: 1 1 60%;
  overflow-y: auto;
  padding: 32px 48px 64px;
  background: var(--surface);
  border-right: 1px solid var(--border);
}
.paper-panel-inner { max-width: 720px; margin: 0 auto; }

.para {
  padding: 8px 16px;
  margin: 0 -16px 2px;
  border-left: 3px solid transparent;
  border-radius: 4px;
  font-size: 15px;
  line-height: 1.75;
  cursor: default;
  transition: border-color 0.2s, background 0.2s;
  position: relative;
}
.para .para-idx {
  position: absolute;
  left: -44px;
  top: 10px;
  font-size: 10px;
  font-weight: 500;
  color: var(--text-muted);
  width: 28px;
  text-align: right;
  opacity: 0;
  transition: opacity 0.15s;
}
.para:hover .para-idx { opacity: 1; }
.para.has-comment .para-idx { opacity: 0.6; }
.para.has-comment {
  border-left-color: var(--accent);
  background: var(--accent-light);
  cursor: pointer;
}
.para.highlight {
  background: #fad7dc;
  border-left-color: var(--accent-hover);
}
.para p { margin-bottom: 0.6em; }
.para p:last-child { margin-bottom: 0; }
.para h1, .para h2 { font-size: 18px; font-weight: 700; margin: 8px 0 4px; }
.para h3, .para h4 { font-size: 16px; font-weight: 600; margin: 6px 0 2px; }
.para code { background: #f3f4f6; padding: 2px 6px; border-radius: 4px; font-size: 13px; }
.para pre { background: #f3f4f6; padding: 12px 16px; border-radius: var(--radius-sm); overflow-x: auto; font-size: 13px; margin: 8px 0; }
.para table { border-collapse: collapse; font-size: 13px; margin: 8px 0; }
.para td, .para th { border: 1px solid var(--border); padding: 6px 10px; }
.para th { background: var(--bg); font-weight: 600; }
.MathJax { overflow-x: auto; overflow-y: hidden; }

/* ── Resize Handle ── */
.resize-handle {
  flex: 0 0 5px;
  cursor: col-resize;
  background: var(--border);
  transition: background 0.15s;
  position: relative;
  z-index: 10;
}
.resize-handle:hover, .resize-handle.dragging { background: var(--accent); }

/* ── Comment Panel ── */
.comment-panel {
  flex: 0 0 480px;
  min-width: 280px;
  max-width: 60vw;
  overflow-y: auto;
  padding: 20px;
  background: var(--bg);
}
.overall-feedback {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 20px;
  margin-bottom: 16px;
  font-size: 14px;
  line-height: 1.65;
  box-shadow: var(--shadow-sm);
}
.overall-feedback h3 {
  font-size: 13px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--accent);
  margin-bottom: 8px;
}
.comment-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 20px;
  margin-bottom: 10px;
  cursor: pointer;
  transition: box-shadow 0.15s, border-color 0.15s;
  box-shadow: var(--shadow-sm);
}
.comment-card:hover { box-shadow: var(--shadow-md); border-color: #d1d5db; }
.comment-card.active { border-color: var(--accent); box-shadow: var(--shadow-focus), var(--shadow); }
.comment-card .card-header { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 8px; }
.comment-card .card-title { font-weight: 600; font-size: 15px; line-height: 1.4; flex: 1; }
.comment-card .quote {
  color: var(--text-secondary);
  font-size: 14px;
  line-height: 1.5;
  border-left: 2px solid var(--border);
  padding-left: 12px;
  margin: 8px 0;
}
.comment-card .explanation { font-size: 14px; line-height: 1.6; margin-top: 8px; }
.comment-card .para-link { font-size: 11px; font-weight: 500; color: var(--accent); margin-top: 8px; display: inline-block; }
.comment-card .para-link.unlocated { color: var(--text-muted); }
.section-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin: 20px 0 10px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border-light);
}
.empty-state { text-align: center; color: var(--text-muted); padding: 48px 24px; font-size: 14px; }

/* ── Status Screen ── */
.status-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: calc(100vh - var(--header-h));
  padding: 48px 24px;
  text-align: center;
}
.status-screen.hidden { display: none; }
.spinner {
  width: 44px;
  height: 44px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin-bottom: 24px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.status-title {
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 8px;
}
.status-msg {
  font-size: 14px;
  color: var(--text-secondary);
  max-width: 420px;
  line-height: 1.6;
  margin-bottom: 20px;
}
.token-display {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 16px;
  font-family: 'SF Mono', 'Fira Code', monospace;
  font-size: 13px;
  color: var(--text-secondary);
  word-break: break-all;
  max-width: 480px;
  margin-bottom: 8px;
}
.status-hint { font-size: 12px; color: var(--text-muted); }
.status-error { color: #dc2626; }

/* ── Viz chrome hidden until ready ── */
.viz-chrome { display: none; }
.viz-chrome.visible { display: block; }
.viz-main { display: none; }
.viz-main.visible { display: flex; height: calc(100vh - var(--header-h) - var(--tabs-h) - var(--metrics-h)); }

/* Scrollbars */
.paper-panel::-webkit-scrollbar,
.comment-panel::-webkit-scrollbar { width: 6px; }
.paper-panel::-webkit-scrollbar-track,
.comment-panel::-webkit-scrollbar-track { background: transparent; }
.paper-panel::-webkit-scrollbar-thumb,
.comment-panel::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }
</style>
</head>
<body>

<div class="header">
  <a class="logo" href="../index.html">OpenAIReview</a>
  <span class="separator"></span>
  <div class="header-links" style="display: flex; gap: 16px; font-size: 13px; font-weight: 500; margin-right: 16px;">
    <a href="../blog.html" style="color: var(--text-secondary); text-decoration: none;">Blog</a>
  </div>
  <div class="paper-title" id="paper-title">Loading review...</div>
  <div class="legend" id="legend"></div>
</div>

<!-- Tabs + metrics only shown when review is ready -->
<div class="viz-chrome" id="viz-chrome">
  <div class="tabs-bar" id="method-tabs"></div>
  <div class="metrics-bar" id="metrics-bar"></div>
</div>

<!-- Status screen (pending / error / no token) -->
<div class="status-screen" id="status-screen">
  <div class="spinner" id="status-spinner"></div>
  <div class="status-title" id="status-title">Processing your review...</div>
  <div class="status-msg" id="status-msg">
    This usually takes 2–5 minutes. You'll receive an email when your review is ready.
  </div>
  <div style="display:flex;align-items:center;gap:8px;max-width:480px;width:100%;">
    <div class="token-display" id="status-token" style="flex:1;margin-bottom:0;"></div>
    <button id="copy-token-btn" onclick="copyToken()" style="flex-shrink:0;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 14px;font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;color:var(--text-secondary);transition:border-color 0.15s,color 0.15s;">Copy</button>
  </div>
  <div class="status-hint" id="status-hint">Checking again in 30 seconds...</div>
</div>

<!-- Main viz (shown when done) -->
<div class="viz-main" id="viz-main">
  <div class="paper-panel" id="paper-panel"></div>
  <div class="resize-handle" id="resize-handle"></div>
  <div class="comment-panel" id="comment-panel"></div>
</div>

<script>

const BACKEND_URL = 'https://openaireview-backend-947059889174.us-central1.run.app';

let paper = null;
let currentMethod = null;
let activeCommentId = null;
let renderedPaper = false;
let typesetQueue = Promise.resolve();
let pollTimer = null;

const METHOD_ORDER = ['ground_truth', 'zero_shot', 'local', 'progressive', 'progressive_full'];

function typesetElement(el) {
  if (!window.MathJax || typeof MathJax.typesetPromise !== 'function') return;
  typesetQueue = typesetQueue.then(() => {
    MathJax.typesetClear([el]);
    return MathJax.typesetPromise([el]);
  }).catch(err => console.warn('MathJax:', err));
}

function renderMarkdownWithMath(text) {
  const mathStore = [];
  let processed = text.replace(/\$\$([\s\S]+?)\$\$/g, (match) => {
    mathStore.push(match);
    return `%%MATH_${mathStore.length - 1}%%`;
  });
  processed = processed.replace(/\$([^\$]+?)\$/g, (match) => {
    mathStore.push(match);
    return `%%MATH_${mathStore.length - 1}%%`;
  });
  processed = processed.replace(/\\\[[\s\S]+?\\\]/g, (match) => {
    mathStore.push(match);
    return `%%MATH_${mathStore.length - 1}%%`;
  });
  processed = processed.replace(/\\\([\s\S]+?\\\)/g, (match) => {
    mathStore.push(match);
    return `%%MATH_${mathStore.length - 1}%%`;
  });
  let html = marked.parse(processed);
  html = html.replace(/%%MATH_(\d+)%%/g, (_, idx) => mathStore[parseInt(idx)]);
  return html;
}

function getMethodKeys() {
  if (!paper) return [];
  const keys = Object.keys(paper.methods);
  keys.sort((a, b) => {
    let ia = METHOD_ORDER.indexOf(a), ib = METHOD_ORDER.indexOf(b);
    if (ia === -1) ia = 999;
    if (ib === -1) ib = 999;
    return ia - ib || a.localeCompare(b);
  });
  return keys;
}

function buildMethodTabs() {
  const container = document.getElementById('method-tabs');
  container.innerHTML = '';
  if (!paper) return;
  const keys = getMethodKeys();
  if (keys.length > 0 && (!currentMethod || !paper.methods[currentMethod])) {
    currentMethod = keys[0];
  }
  keys.forEach(key => {
    const tab = document.createElement('button');
    tab.className = 'method-tab' + (key === currentMethod ? ' active' : '');
    const count = paper.methods[key].comments.length;
    tab.innerHTML = `${escapeHtml(paper.methods[key].label)}<span class="tab-count">${count}</span>`;
    tab.addEventListener('click', () => {
      currentMethod = key;
      activeCommentId = null;
      render();
    });
    container.appendChild(tab);
  });
}

function renderMetrics() {
  const bar = document.getElementById('metrics-bar');
  if (!paper) { bar.innerHTML = ''; return; }
  const method = paper.methods[currentMethod];
  if (!method) { bar.innerHTML = ''; return; }
  const parts = [];
  if (method.model) parts.push(`<span class="metric">Model <strong>${escapeHtml(method.model)}</strong></span>`);
  if (method.prompt_tokens !== undefined) {
    const totalTokens = (method.prompt_tokens + method.completion_tokens).toLocaleString();
    parts.push(`<span class="metric">Tokens <strong>${totalTokens}</strong></span>`);
  }
  if (method.cost_usd !== undefined) {
    parts.push(`<span class="metric">Cost <strong>$${method.cost_usd.toFixed(2)}</strong></span>`);
  }
  if (parts.length > 0) parts.push(`<span class="metric-divider"></span>`);
  parts.push(`<span class="metric"><strong>${method.comments.length}</strong> comments</span>`);
  bar.innerHTML = parts.join('');
}

function renderLegend() {
  document.getElementById('legend').innerHTML = `
    <span class="legend-item"><span class="legend-swatch" style="background:var(--accent-light);border-left:3px solid var(--accent)"></span>Comment</span>
  `;
}

function renderPaperContent() {
  const panel = document.getElementById('paper-panel');
  let html = '<div class="paper-panel-inner">';
  paper.paragraphs.forEach(p => {
    const rendered = renderMarkdownWithMath(p.text);
    html += `<div class="para" id="para-${p.index}" data-idx="${p.index}">
      <span class="para-idx">${p.index}</span>
      ${rendered}
    </div>`;
  });
  html += '</div>';
  panel.innerHTML = html;
}

function updatePaperHighlights() {
  const panel = document.getElementById('paper-panel');
  const method = paper.methods[currentMethod];
  const commentIndices = new Set();
  if (method) method.comments.forEach(c => { if (c.paragraph_index != null) commentIndices.add(c.paragraph_index); });

  panel.querySelectorAll('.para').forEach(el => {
    const idx = parseInt(el.dataset.idx);
    const hasComment = commentIndices.has(idx);
    const isHighlight = activeCommentId != null && method &&
      method.comments.some(c => c.id === activeCommentId && c.paragraph_index === idx);
    el.className = 'para';
    if (isHighlight) el.classList.add('highlight');
    else if (hasComment) el.classList.add('has-comment');
  });

  panel.querySelectorAll('.para.has-comment').forEach(el => {
    el.onclick = () => {
      const idx = parseInt(el.dataset.idx);
      const comment = method.comments.find(c => c.paragraph_index === idx);
      if (comment) {
        activeCommentId = comment.id;
        render();
        const card = document.getElementById('card-' + comment.id);
        if (card) card.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
    };
  });
}

function renderComments() {
  const panel = document.getElementById('comment-panel');
  const method = paper.methods[currentMethod];
  if (!method) { panel.innerHTML = '<div class="empty-state">No data for this method.</div>'; return; }

  let html = '';
  if (method.overall_feedback) {
    html += `<div class="overall-feedback"><h3>Overall Feedback</h3>${renderMarkdownWithMath(method.overall_feedback)}</div>`;
  }

  const located = method.comments.filter(c => c.paragraph_index != null);
  const unlocated = method.comments.filter(c => c.paragraph_index == null);
  located.sort((a, b) => a.paragraph_index - b.paragraph_index);

  if (located.length > 0) {
    html += `<div class="section-label">Comments (${located.length})</div>`;
    located.forEach(c => { html += renderCommentCard(c); });
  }
  if (unlocated.length > 0) {
    html += `<div class="section-label">Unlocated (${unlocated.length})</div>`;
    unlocated.forEach(c => { html += renderCommentCard(c); });
  }
  if (method.comments.length === 0) {
    html += '<div class="empty-state">No comments from this method.</div>';
  }

  panel.innerHTML = html;
  typesetElement(panel);

  panel.querySelectorAll('.comment-card').forEach(card => {
    card.classList.toggle('active', card.dataset.id === activeCommentId);
    card.onclick = () => {
      const id = card.dataset.id;
      const comment = method.comments.find(c => c.id === id);
      activeCommentId = id;
      render();
      if (comment && comment.paragraph_index != null) {
        const paraEl = document.getElementById('para-' + comment.paragraph_index);
        if (paraEl) paraEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
      document.getElementById('card-' + id)?.scrollIntoView({ behavior: 'smooth', block: 'center' });
    };
  });
}

function renderCommentCard(c) {
  const paraLink = c.paragraph_index != null
    ? `<span class="para-link">\u00b6 ${c.paragraph_index}</span>`
    : '<span class="para-link unlocated">unlocated</span>';
  const quoteText = c.quote || '';
  const explanationText = c.explanation || c.message || '';
  return `<div class="comment-card" id="card-${c.id}" data-id="${c.id}">
    <div class="card-header"><span class="card-title">${escapeHtml(c.title)}</span></div>
    ${quoteText ? `<div class="quote">${renderMarkdownWithMath(wrapBareLaTeX(quoteText))}</div>` : ''}
    ${explanationText ? `<div class="explanation">${renderMarkdownWithMath(explanationText)}</div>` : ''}
    ${paraLink}
  </div>`;
}

function wrapBareLaTeX(text) {
  if (!text || text.includes('$')) return text;
  if (/\\[a-zA-Z]/.test(text)) {
    if (text.includes('&')) return '$$\\begin{aligned}' + text + '\\end{aligned}$$';
    return '$' + text + '$';
  }
  return text;
}

function escapeHtml(s) {
  const div = document.createElement('div');
  div.textContent = s;
  return div.innerHTML;
}

function render() {
  buildMethodTabs();
  renderMetrics();
  renderLegend();
  if (!renderedPaper) {
    renderPaperContent();
    renderedPaper = true;
    typesetElement(document.getElementById('paper-panel'));
  }
  updatePaperHighlights();
  renderComments();
}

function showViz() {
  document.getElementById('status-screen').classList.add('hidden');
  document.getElementById('viz-chrome').classList.add('visible');
  document.getElementById('viz-main').classList.add('visible');
  document.getElementById('paper-title').textContent = paper.title || 'Review';
}

function showStatus(title, msg, isError, hint) {
  document.getElementById('status-title').textContent = title;
  document.getElementById('status-msg').textContent = msg;
  document.getElementById('status-hint').textContent = hint || '';
  if (isError) {
    document.getElementById('status-spinner').style.display = 'none';
    document.getElementById('status-title').classList.add('status-error');
  }
}

async function pollStatus(token) {
  let resp;
  try {
    resp = await fetch(`${BACKEND_URL}/status/${token}`);
  } catch {
    showStatus(
      'Server unreachable',
      'The review server may be starting up (cold start ~30s). Retrying...',
      false,
      'Retrying in 15 seconds...'
    );
    pollTimer = setTimeout(() => pollStatus(token), 15000);
    return;
  }

  if (resp.status === 404) {
    showStatus(
      'Token not found',
      'This token was not found on the server. The server may have restarted and lost in-memory results. Please submit a new review.',
      true,
      ''
    );
    return;
  }

  const body = await resp.json();
  const { status } = body;

  if (status === 'pending') {
    showStatus('Processing your review...', 'This usually takes 2–5 minutes. You\'ll receive an email when it\'s ready.', false, 'Checking again in 30 seconds...');
    pollTimer = setTimeout(() => pollStatus(token), 30000);
    return;
  }

  if (status === 'error') {
    try {
      const errResp = await fetch(`${BACKEND_URL}/results/${token}`);
      const errData = await errResp.json();
      showStatus('Review failed', errData.detail || 'An error occurred during review.', true, '');
    } catch {
      showStatus('Review failed', 'An error occurred during review.', true, '');
    }
    return;
  }

  if (status === 'done') {
    const dataResp = await fetch(`${BACKEND_URL}/results/${token}`);
    paper = await dataResp.json();
    showViz();
    render();
  }
}

async function init() {
  const params = new URLSearchParams(window.location.search);
  const token = params.get('token');

  if (!token) {
    document.getElementById('status-spinner').style.display = 'none';
    document.getElementById('status-token').style.display = 'none';
    showStatus(
      'No token provided',
      'Visit the home page to upload a paper and get a review token.',
      true,
      ''
    );
    return;
  }

  document.getElementById('status-token').textContent = token;
  document.title = `OpenAIReview — ${token.slice(0, 8)}...`;

  await pollStatus(token);
}

function copyToken() {
  const token = document.getElementById('status-token').textContent;
  if (!token) return;
  const btn = document.getElementById('copy-token-btn');
  navigator.clipboard.writeText(token).then(() => {
    btn.textContent = 'Copied!';
    btn.style.color = 'var(--green)';
    btn.style.borderColor = 'var(--green)';
    setTimeout(() => {
      btn.textContent = 'Copy';
      btn.style.color = '';
      btn.style.borderColor = '';
    }, 2000);
  });
}

document.addEventListener('DOMContentLoaded', () => {
  init();

  const handle = document.getElementById('resize-handle');
  const commentPanel = document.getElementById('comment-panel');
  let startX, startWidth;

  handle.addEventListener('mousedown', (e) => {
    startX = e.clientX;
    startWidth = commentPanel.offsetWidth;
    handle.classList.add('dragging');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';

    function onMove(e) {
      const delta = startX - e.clientX;
      const newWidth = Math.min(Math.max(startWidth + delta, 280), window.innerWidth * 0.6);
      commentPanel.style.flex = `0 0 ${newWidth}px`;
    }
    function onUp() {
      handle.classList.remove('dragging');
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    }
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
});
</script>
