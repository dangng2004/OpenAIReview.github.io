steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/openaireview-backend', 'backend/']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/openaireview-backend']
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    args:
      - gcloud
      - run
      - deploy
      - openaireview-backend
      - --image=gcr.io/$PROJECT_ID/openaireview-backend
      - --region=us-central1
      - --platform=managed
      - --allow-unauthenticated
      - --set-env-vars
      - >-
        OPENROUTER_BASE_URL=https://openrouter.ai/api/v1,
        MODEL=anthropic/claude-opus-4-6,
        FIRESTORE_DB=openaireview-db,
        FRONTEND_URL=https://openaireview.github.io,
        FROM_EMAIL=noreply@hypogenic.ai
